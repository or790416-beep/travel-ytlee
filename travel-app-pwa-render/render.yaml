services:
  - type: web
    name: travel-itinerary-pwa
    runtime: node
    plan: free
    rootDir: travel-app-pwa-render
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
